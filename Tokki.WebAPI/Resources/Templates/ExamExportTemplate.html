<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>{{ Title }} - Tokki TOPIK</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Inter:wght@400;700&display=swap');

        body {
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fff;
            color: #000;
        }

        /* Cover Page Styles */
        .cover-page {
            box-sizing: border-box;
            width: 210mm;
            padding: 15mm;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            page-break-after: always;
            margin: auto;
        }

        .cover-header {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 60px;
        }

        .topik-logo-container {
            text-align: center;
        }

        .topik-logo-container img {
            height: 45px;
            object-fit: contain;
        }

        .test-title-box {
            border: 3px solid #000;
            border-radius: 25px;
            padding: 25px 50px;
            margin: 0 auto 60px;
            text-align: center;
            min-width: 70%;
        }

        .test-title-ko {
            font-size: 32px;
            margin: 0;
            font-weight: 700;
            letter-spacing: 1px;
            line-height: 1.3;
        }

        .level-container {
            width: 65%;
            border-top: 3px solid #000;
            border-bottom: 1.5px solid #000;
            padding: 15px 0;
            margin: 0 auto 60px;
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .level-badge {
            background: #000;
            color: #fff;
            width: 38px;
            height: 38px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            margin-left: 15px;
            font-weight: 700;
            font-size: 22px;
        }

        .skill-table-cover {
            width: 65%;
            margin: 0 auto 80px;
            border-collapse: collapse;
            border: 2px solid #000;
        }

        .session-cell {
            padding: 15px 30px;
            font-size: 30px;
            font-weight: 700;
            text-align: center;
            border-right: 2px solid #000;
            white-space: nowrap;
            width: 1%;
        }

        .skill-cell-box {
            text-align: center;
            padding: 10px;
        }

        .skill-ko-title {
            font-size: 32px;
            font-weight: 700;
            line-height: 1.1;
        }

        .skill-en-title {
            font-family: 'Times New Roman', serif;
            font-size: 16px;
            margin-top: 5px;
            color: #555;
        }

        .reg-table {
            width: 85%;
            border-collapse: collapse;
            margin: auto auto 40px;
        }

        .reg-table td {
            border: 1px solid #000;
            padding: 10px 20px;
            height: 40px;
            font-size: 15px;
        }

        .bg-gray {
            background-color: #f9f9f9;
            text-align: center;
            width: 35%;
            font-weight: 700;
        }

        .sub-label {
            font-size: 13px;
            width: 25%;
            border-right: none !important;
            font-weight: 400;
        }

        .footer-org {
            text-align: center;
            width: 100%;
            margin-bottom: 20px;
        }

        .niied-logo-img {
            height: 60px;
            margin-bottom: 12px;
            filter: grayscale(1);
        }

        .org-name-ko {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 5px;
        }

        .org-name-en {
            font-size: 13px;
            font-family: Arial, sans-serif;
            color: #444;
            margin-top: 4px;
        }

        /* Main Content Styles */
        .page-content {
            box-sizing: border-box;
            width: 210mm;
            margin: auto;
            padding: 0 40px;
        }

        .skill-header {
            page-break-before: always;
            text-align: center;
            margin-top: 0px;
            margin-bottom: 25px;
            border-bottom: 2px solid #000;
            padding-bottom: 0px;
        }

        .skill-header.first-skill {
            page-break-before: avoid;
        }

        .skill-header h1 {
            font-size: 24px;
            font-weight: 700;
            display: inline-block;
            background: #fff;
            position: relative;
            padding: 0 20px;
            top: 18px;
            margin: 0;
        }

        .part-section {
            margin-top: 30px;
        }

        .part-header-topik {
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 12px;
        }

        .passage-box {
            border: 1px solid #000;
            padding: 15px;
            margin-bottom: 15px;
            page-break-inside: avoid;
        }

        .passage-content {
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.6;
        }

        .question-item {
            margin-bottom: 25px;
            page-break-inside: avoid;
        }

        .question-header {
            font-weight: 400;
            font-size: 13px;
            margin-bottom: 8px;
            display: flex;
        }

        .question-no {
            margin-right: 12px;
            min-width: 25px;
        }

        .option-list {
            list-style: none;
            padding-left: 35px;
            margin-top: 8px;
            display: flex;
            flex-wrap: wrap;
        }

        .option-item {
            width: 48%;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .media-image {
            max-width: 80%;
            margin: 10px auto;
            display: block;
            border: 1px solid #eee;
        }

        .explanation-box {
            background-color: #f7f9f9;
            border: 1px solid #d5dbdb;
            padding: 12px 15px;
            font-size: 12px;
            margin-top: 10px;
            border-radius: 4px;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .explanation-title {
            font-weight: 700;
            color: #27ae60;
            margin-bottom: 5px;
            display: block;
            font-size: 11px;
        }

        /* PDF Layout Settings */
        @page {
            margin: 1cm;
        }
    </style>
</head>

<body>
    <!-- Cover Page -->
    <div class="cover-page">
        <div class="cover-header">
            <div class="topik-logo-container">
                <img src="https://res.cloudinary.com/dxfii0v3c/image/upload/v1774697028/tokki/avatar/znihqw0wc5pncfadun4q.png"
                    alt="TOPIK Logo">
            </div>
        </div>

        <div class="test-title-box">
            <h1 class="test-title-ko">{{ Title }}</h1>
        </div>

        <div class="level-container">
            {{ TopikLevelName }} <span class="level-badge">B</span>
        </div>

        <table class="skill-table-cover">
            <tr>
                <td class="session-cell">2교시</td>
                <td class="skill-cell-box">
                    <div class="skill-ko-title">{{ SkillKo }}</div>
                    <div class="skill-en-title">({{ SkillEn }})</div>
                </td>
            </tr>
        </table>

        <table class="reg-table">
            <tr>
                <td class="bg-gray">수험번호 (Registration No.)</td>
                <td colspan="2"></td>
            </tr>
            <tr>
                <td rowspan="2" class="bg-gray">이름 (Name)</td>
                <td class="sub-label">한국어 (Korean)</td>
                <td></td>
            </tr>
            <tr>
                <td class="sub-label" style="border-top: none;">영어 (English)</td>
                <td style="border-top: none;"></td>
            </tr>
        </table>
    </div>

    <!-- Main Content Section -->
    <div class="page-content">
        {{ QuestionsHtml }}
    </div>
</body>

</html>
