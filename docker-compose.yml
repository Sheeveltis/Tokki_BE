version: '3.9'

services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: tokki_sqlserver
    environment:
      SA_PASSWORD: "${SQL_SA_PASSWORD}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P '${SQL_SA_PASSWORD}' -Q 'SELECT 1' -No -C || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - tokki_network

 
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tokki_api
    ports:
      - "8080:8080"
    environment:
- SepaySettings__BankName=OCB
- SepaySettings__AccountNumber=0037100025583005
- SepaySettings__AccountName=Tang Ngoc Trang Anh
- SepaySettings__SubAccount=SEPEIC2025
- SepaySettings__WebhookEndpoint=/api/webhooks/payment

- AzureSpeech__Key=${AZURE_SPEECH_KEY}
- AzureSpeech__Region=southeastasia

- Gemini__Writing__BaseUrl=https://generativelanguage.googleapis.com/v1beta/
- Gemini__Writing__Model=gemini-2.5-pro
- Gemini__Writing__ApiKey=${GEMINI_API_KEY_1}
- Gemini__Wordle__BaseUrl=https://generativelanguage.googleapis.com/v1beta/
- Gemini__Wordle__Model=gemini-3-flash-preview
- Gemini__Wordle__ApiKey=${GEMINI_API_KEY_2}
- Gemini__Pronunciation__BaseUrl=https://generativelanguage.googleapis.com/v1beta/
- Gemini__Pronunciation__Model=gemini-3-flash-preview
- Gemini__Pronunciation__ApiKey=${GEMINI_API_KEY_2}
- Gemini__Roadmap__BaseUrl=https://generativelanguage.googleapis.com/v1beta/
- Gemini__Roadmap__Model=gemini-3-flash-preview
- Gemini__Roadmap__ApiKey=${GEMINI_API_KEY_1}
- Gemini__Blog__BaseUrl=https://generativelanguage.googleapis.com/v1beta/
- Gemini__Blog__Model=gemini-3-flash-preview
- Gemini__Blog__ApiKey=${GEMINI_API_KEY_1}
- Gemini__GenCoverBlog__BaseUrl=https://generativelanguage.googleapis.com/v1beta/
- Gemini__GenCoverBlog__Model=gemini-3.1-flash-image-preview
- Gemini__GenCoverBlog__ApiKey=${GEMINI_API_KEY_1}

- PixabaySettings__ApiKey=${PIXABAY_API_KEY}

- RedisSettings__Host=${REDIS_HOST}
- RedisSettings__Port=${REDIS_PORT}
- RedisSettings__Password=${REDIS_PASSWORD}

- AiSettings__ApiKey=${AI_SETTINGS_API_KEY}

- FacebookAuth__AppId=${FACEBOOK_APP_ID}
- FacebookAuth__AppSecret=${FACEBOOK_APP_SECRET}

- Authentication__Google__ClientIds__0=${GOOGLE_CLIENT_ID}

    volumes:
      - ${VERTEX_CREDENTIALS_PATH}:/app/credentials/vertex-credentials.json:ro

    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - tokki_network
    restart: unless-stopped

volumes:
  sqlserver_data:

networks:
  tokki_network:
    driver: bridge
